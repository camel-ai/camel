name: docs-code-map-check

on:
  pull_request:
    paths:
      - "camel/**"
      - "services/**"
      - "docs/mintlify/key_modules/**"
      - "docs/mintlify/mcp/**"
      - "docs/scripts/docs_sync/**"
  workflow_dispatch:

jobs:
  validate-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify doc_code_map
        run: python docs/scripts/docs_sync/doc_code_map.py verify

      - name: Compute impacted docs
        if: github.event_name == 'pull_request'
        id: impacted
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python docs/scripts/docs_sync/doc_code_map.py impacted --base-ref "$BASE_SHA" --head-ref "$HEAD_SHA" > impacted_docs.txt
          cat impacted_docs.txt
          echo "count=$(wc -l < impacted_docs.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Report impacted docs
        if: github.event_name == 'pull_request'
        run: |
          if [ ! -s impacted_docs.txt ]; then
            echo "No mapped docs impacted by this PR."
            {
              echo "## Impacted docs"
              echo
              echo "No mapped docs were impacted by this PR."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "Mapped docs impacted by this PR:"
          cat impacted_docs.txt
          {
            echo "## Impacted docs"
            echo
            while IFS= read -r doc; do
              echo "- \`$doc\`"
            done < impacted_docs.txt
          } >> "$GITHUB_STEP_SUMMARY"
