# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Pytest Camel package

on:
  push:
    branches: [ "master", "qa" ]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "LICENSE"
  pull_request:
    branches: [ "master", "qa" ]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "LICENSE"

permissions:
  contents: read

jobs:
  pytest_package_fast_test:
    runs-on: ubuntu-latest
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
      with:
        egress-policy: audit

    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
    - name: Set up Python environment and install dependencies
      uses: ./.github/actions/camel_install
      with:
        python-version: "3.10"
    - name: Run pytest
      env:
        OPENAI_API_KEY: "${{ secrets.OPENAI_API_KEY || 'dummy-key-for-test-collectioncases' }}"
        GOOGLE_API_KEY: "${{ secrets.GOOGLE_API_KEY || 'dummy-key-for-test-collectioncases' }}"
