        ZHIPUAI_API_KEY: "${{ secrets.ZHIPUAI_API_KEY || 'dummy-key-for-test-collectioncases' }}"
        HF_TOKEN: "${{ secrets.HF_TOKEN || 'dummy-key-for-test-collectioncases' }}"
