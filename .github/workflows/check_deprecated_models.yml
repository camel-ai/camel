# Weekly check for deprecated models in ModelType enum

name: Check Deprecated Models

on:
  push:
    branches:
      - 3868-feature-request-clean-and-remove-deprecated-models-from-model-list
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-models:
    runs-on: ubuntu-latest

    steps:
    - uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76
      with:
        egress-policy: audit

    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

    - uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install camel-ai
      run: pip install -e '.[model_platforms]'

    - name: Check deprecated models
      id: check
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        NOVITA_API_KEY: ${{ secrets.NOVITA_API_KEY }}
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        NEBIUS_API_KEY: ${{ secrets.NEBIUS_API_KEY }}
        COMETAPI_KEY: ${{ secrets.COMETAPI_KEY }}
        PPIO_API_KEY: ${{ secrets.PPIO_API_KEY }}
        SAMBA_API_KEY: ${{ secrets.SAMBA_API_KEY }}
        REKA_API_KEY: ${{ secrets.REKA_API_KEY }}
        ZHIPUAI_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
        NETMIND_API_KEY: ${{ secrets.NETMIND_API_KEY }}
        NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        YI_API_KEY: ${{ secrets.YI_API_KEY }}
        INTERNLM_API_KEY: ${{ secrets.INTERNLM_API_KEY }}
        MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
        AIML_API_KEY: ${{ secrets.AIML_API_KEY }}
        MODELSCOPE_SDK_TOKEN: ${{ secrets.MODELSCOPE_SDK_TOKEN }}
        WATSONX_API_KEY: ${{ secrets.WATSONX_API_KEY }}
        QIANFAN_API_KEY: ${{ secrets.QIANFAN_API_KEY }}
        CRYNUX_API_KEY: ${{ secrets.CRYNUX_API_KEY }}
        MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        AVIAN_API_KEY: ${{ secrets.AVIAN_API_KEY }}
        ATLASCLOUD_API_KEY: ${{ secrets.ATLASCLOUD_API_KEY }}
      run: python profiling/check_deprecated_models.py

    - name: Check for existing open issue
      if: steps.check.outputs.has_deprecated == 'true' || steps.check.outputs.has_new == 'true'
      id: existing_issue
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        ISSUE_COUNT=$(gh issue list --label "model-check" --state open --json number --jq 'length')
        echo "count=$ISSUE_COUNT" >> "$GITHUB_OUTPUT"

    - name: Create issue for model changes
      if: >-
        (steps.check.outputs.has_deprecated == 'true' || steps.check.outputs.has_new == 'true')
        && steps.existing_issue.outputs.count == '0'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REPORT: ${{ steps.check.outputs.report }}
      run: |
        cat > /tmp/issue_body.md <<'ISSUE_EOF'
        This issue was automatically created by the weekly model check workflow.

        ISSUE_EOF
        echo "$REPORT" >> /tmp/issue_body.md
        cat >> /tmp/issue_body.md <<LINK_EOF

        ---
        *Generated by [Check Deprecated Models](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) workflow.*
        LINK_EOF
        gh issue create \
          --title "[Auto] Deprecated/New models detected ($(date +%Y-%m-%d))" \
          --body-file /tmp/issue_body.md \
          --label "model-check"
