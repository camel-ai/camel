name: docs-release-sync-check

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base ref for diff"
        required: true
      head_ref:
        description: "Head ref for diff"
        required: true

jobs:
  release-doc-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify doc_code_map
        run: python docs/scripts/docs_sync/doc_code_map.py verify

      - name: Check impacted docs
        run: |
          git diff --name-only "${{ inputs.base_ref }}..${{ inputs.head_ref }}" -- '*.py' | \
            grep -E '^(camel|services)/.*\.py$' > changed_python_files.txt || true

          if [ ! -s changed_python_files.txt ]; then
            echo "No changed Python files in the selected diff."
            exit 0
          fi

          python docs/scripts/docs_sync/doc_code_map.py impacted \
            --changed-files-file changed_python_files.txt > impacted_docs.txt

          if [ -s impacted_docs.txt ]; then
            echo "The selected diff would update these mapped docs:"
            cat impacted_docs.txt
            exit 0
          fi

          echo "No mapped docs need updates for the selected diff."
